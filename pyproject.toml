[project]
name = "wingechr-datatools"
version = "0.14.0"
description = "TODO"
readme = "README.md"
requires-python = ">=3.10,<3.14"
authors = [{ name = "Christian Winger", email = "c@wingechr.de" }]
dependencies = [
    "coloredlogs~=15.0",
    #"appdirs>=1.4.4",
    #"chardet>=5.2.0",
    #"jsonpath-ng>=1.7.0",
    #"openpyxl>=3.1.5",
    #"pandas>=2",
    #"pyodbc>=5.2.0",
    #"rdflib>=7.1.4",
    #"requests>=2",
    #"sqlalchemy>=2.0.41",
    #"sqlparse>=0.5.3",
    #"tzlocal>=5.3.1",
    #"unidecode>=1.4.0",
]
[dependency-groups]
dev = ["bumpversion~=0.6", "pre-commit~=4.2"]
poe = ["poethepoet~=0.38"]
build = ["wheel~=0.46", "setuptools~=82.0", "build~=1.4"]
test = ["tox~=4.47", "pytest~=9.0"]
docs = [
    "mdx-truly-sane-lists~=1.3",
    "mistune~=2.0",
    "mkdocs~=1.6,<2.0",          # 2.0 is incompatible with material
    "mkdocs-material~=9.7",      # NOTE problems installing in windows
    "mkdocstrings-python~=1.16",
    "pymdown-extensions~=10.16",
]
[tool.setuptools.packages.find]
include = ["datatools"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project.scripts]
datatools = "datatools.__main__:main"

[tool.tox]
envlist = ["py310", "py313"]
#testenv = { commands = ["python -m unittest"] }

[tool.poe.tasks]
test = "tox"
build = "python -m build --wheel"
docs = "mkdocs build"
run = "python -m datatools -l debug"
